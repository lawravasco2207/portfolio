name: portfolio
region: nyc
services:
- name: web
  image:
    registry_type: GHCR
    repository: larry/portfolio
    tag: latest
  http_port: 3000
  envs:
  - key: SMTP_HOST
    scope: RUN_TIME
    type: SECRET
  - key: SMTP_PORT
    scope: RUN_TIME
    type: SECRET
  - key: SMTP_SECURE
    scope: RUN_TIME
    type: SECRET
  - key: SMTP_USER
    scope: RUN_TIME
    type: SECRET
  - key: SMTP_PASS
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_BUCKET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_REGION
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_ENDPOINT
    scope: RUN_TIME
    type: SECRET
  - key: GITHUB_TOKEN
    scope: RUN_TIME
    type: SECRET
